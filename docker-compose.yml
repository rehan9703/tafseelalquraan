version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tafseel-postgres
    restart: always
    environment:
      POSTGRES_USER: tafseel_user
      POSTGRES_PASSWORD: tafseel_pass_2024
      POSTGRES_DB: tafseel_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tafseel-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tafseel-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - tafseel-network

  # Backend API
  backend:
    build:
      context: ./tafseel-al-quran/server
      dockerfile: Dockerfile
    container_name: tafseel-backend
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://tafseel_user:tafseel_pass_2024@postgres:5432/tafseel_db
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: your_super_secure_access_secret_key_here_change_in_production
      JWT_REFRESH_SECRET: your_super_secure_refresh_secret_key_here_change_in_production
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CLIENT_URL: http://localhost:5173
      PORT: 5000
      NODE_ENV: production
    ports:
      - '5000:5000'
    networks:
      - tafseel-network
    volumes:
      - ./tafseel-al-quran/server:/app
      - /app/node_modules

  # Frontend
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: tafseel-frontend
    restart: always
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
      VITE_APP_NAME: Tafseel-al-Qur'an
    ports:
      - '5173:5173'
    networks:
      - tafseel-network
    volumes:
      - ./app:/app
      - /app/node_modules

networks:
  tafseel-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
