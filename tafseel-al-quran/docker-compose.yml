version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tafseel-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-tafseel_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    container_name: tafseel-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
